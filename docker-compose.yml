services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      LLM_BACKEND: groq
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: securerag
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data: {}
  chroma_data: {}